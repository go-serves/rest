version: v1
plugins:
  - plugin: buf.build/protocolbuffers/go
    out: gen/go
    opt: paths=source_relative
  - plugin: buf.build/grpc/go
    out: gen/go
    opt: paths=source_relative
  - plugin: buf.build/grpc-ecosystem/gateway
    out: gen/go
    opt: paths=source_relative,generate_unbound_methods=true
  - plugin: buf.build/community/google-gnostic-openapi
    out: gen/openapiv3
  - plugin: buf.build/community/pseudomuto-doc
    out: gen/docs
    opt: markdown,service.md
